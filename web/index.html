<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description" content="Monitor XPUB wallet balances using your own Bitcoin node">
  <meta name="application-name" content="bitBalance">
  <meta name="author" content="Eduardo Zola">

  <title>bitBalance</title>

  <link rel="icon" type="image/png" href="/icon.png">
  <meta name="theme-color" content="#0f1115">

  <link rel="stylesheet" href="/style.css?v=3">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

  <header>
    <div class="logo-title">
      <img src="/logo.png" alt="bitBalance Logo" class="logo" style="width: 40px; height: 40px;" />
      <h1>bitBalance</h1>
    </div>

    <div class="header-buttons">
      <button class="btn btn-primary" onclick="openWalletModal()">Add Wallet</button>
      <button class="btn btn-primary" onclick="load()">Refresh</button>
    </div>

  </header>

  <div class="container">

    <div class="card total-card">

      <div>Total</div>
      <div>
        <div id="totalTop" class="btc-value">
          0.00000000 BTC
        </div>

        <div id="totalUSD" class="usd-value"></div>

      </div>

    </div>

    <div class="card">

      <table id="t">

        <thead>
          <tr>
            <th>Wallet</th>
            <th class="balance">Balance (BTC)</th>
            <th class="chevron"></th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td colspan="3" class="loading">⌛ Loading...</td>
          </tr>
        </tbody>

        <tfoot>
          <tr>
            <td>Total</td>
            <td class="balance" id="total">---</td>
            <td></td>
          </tr>
        </tfoot>

      </table>

      <canvas id="chart" height="140"></canvas>

    </div>

  </div>

  <script src="/scripts.js"></script>

  <footer>
    bitBalance · Eduardo Zola
  </footer>

</body>

</html>
